<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Page title (shown in browser tab) -->
    <title>CampusHub Connect</title>
    
    <!-- Basic meta tags -->
    <meta name="description" content="Connect with fellow students, share resources, and build your campus community" />
    <meta name="author" content="CampusHub" />

    <!-- Open Graph (for social media sharing) -->
    <meta property="og:title" content="CampusHub Connect" />
    <meta property="og:description" content="Connect with fellow students, share resources, and build your campus community" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" /> <!-- Change this later to your own logo -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CampusHub Connect" />
    <meta name="twitter:description" content="Connect with fellow students, share resources, and build your campus community" />
    <meta name="twitter:image" content="/placeholder.svg" />

    <!-- Favicon (this makes the tab icon change) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
